name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-desktop:
    name: Build desktop app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[gui,build]"

      - name: Build desktop app
        run: pyinstaller packaging/sublight-gui.spec --noconfirm

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubLight-${{ runner.os }}
          path: dist/SubLight
