name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[gui,build]"

      - name: Build desktop app
        run: pyinstaller packaging/sublight-gui.spec --noconfirm

      - name: Package desktop artifact
        shell: python
        run: |
          from pathlib import Path
          import shutil

          root = Path("release-artifacts")
          root.mkdir(exist_ok=True)
          shutil.make_archive(
              str(root / "SubLight-${{ runner.os }}"),
              "zip",
              "dist",
              "SubLight",
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubLight-${{ runner.os }}
          path: release-artifacts/SubLight-${{ runner.os }}.zip

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          files: release-artifacts/**/*.zip
